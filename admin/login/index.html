<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Activity Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        
        .loader {
            border-top-color: #3b82f6;
            animation: spinner 1.5s linear infinite;
        }
        @keyframes spinner {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-900">

    <!-- Login Screen -->
    <div id="loginScreen" class="min-h-screen flex items-center justify-center px-4">
        <div class="max-w-md w-full bg-white p-8 rounded-2xl shadow-xl border border-slate-200">
            <div class="text-center mb-8">
                <div class="w-16 h-16 bg-blue-100 rounded-full flex items-center justify-center mx-auto mb-4">
                    <svg class="w-8 h-8 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
                </div>
                <h1 class="text-2xl font-bold text-slate-800">Admin Login</h1>
                <p class="text-slate-500 text-sm">Verify credentials to access the logger</p>
            </div>
            
            <form id="loginForm" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Admin ID</label>
                    <input type="text" id="adminId" required class="w-full px-4 py-2 rounded-lg border border-slate-300 focus:ring-2 focus:ring-blue-500 outline-none transition" placeholder="e.g. admin1">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Password</label>
                    <input type="password" id="password" required class="w-full px-4 py-2 rounded-lg border border-slate-300 focus:ring-2 focus:ring-blue-500 outline-none transition" placeholder="••••••••">
                </div>
                <button type="submit" id="loginBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-lg transition flex items-center justify-center">
                    <span id="loginBtnText">Access Dashboard</span>
                    <div id="loginBtnLoader" class="hidden w-5 h-5 border-2 border-white/30 border-t-white rounded-full animate-spin ml-2"></div>
                </button>
            </form>
            <div id="loginStatus" class="mt-4 hidden p-3 rounded-lg text-sm text-center"></div>
        </div>
    </div>

    <!-- Main App Content (Hidden by default) -->
    <div id="appContent" class="hidden max-w-4xl mx-auto px-4 py-12">
        <header class="flex justify-between items-center mb-12">
            <div>
                <h1 class="text-4xl font-bold tracking-tight text-slate-800">Activity Logger</h1>
                <p class="mt-1 text-slate-500">Log your daily habits as plain text.</p>
            </div>
            <button onclick="logout()" class="text-sm font-medium text-slate-400 hover:text-red-500 transition">Logout</button>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <!-- Form Section -->
            <section class="bg-white p-8 rounded-2xl shadow-sm border border-slate-200 h-fit">
                <h2 class="text-xl font-semibold mb-6 flex items-center">
                    <svg class="w-5 h-5 mr-2 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v3m0 0v3m0-3h3m-3 0H9m12 0a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    New Entry
                </h2>
                <form id="userForm" class="space-y-4">
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">User</label>
                            <select id="user" required class="w-full px-4 py-2 rounded-lg border border-slate-300 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition bg-white">
                                <option value="Me">Me</option>
                                <option value="Wife">Wife</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">Type</label>
                            <select id="type" required class="w-full px-4 py-2 rounded-lg border border-slate-300 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition bg-white">
                                <option value="Walking">Walking</option>
                                <option value="Running">Running</option>
                                <option value="Reading">Reading</option>
                                <option value="Coding">Coding</option>
                                <option value="Workout">Workout</option>
                                <option value="Mediation">Mediation</option>
                                <option value="Learning">Learning</option>
                            </select>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">Date</label>
                            <input type="date" id="date" required class="w-full px-4 py-2 rounded-lg border border-slate-300 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">Time</label>
                            <input type="time" id="time" required class="w-full px-4 py-2 rounded-lg border border-slate-300 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition">
                        </div>
                    </div>

                    <div id="distanceContainer">
                        <label class="block text-sm font-medium text-slate-700 mb-1">Distance (KM)</label>
                        <input type="number" id="distance" step="0.01" class="w-full px-4 py-2 rounded-lg border border-slate-300 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition" placeholder="e.g. 5.25">
                    </div>

                    <button type="submit" id="submitBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-lg transition shadow-md hover:shadow-lg flex items-center justify-center">
                        <span id="btnText">Save to Spreadsheet</span>
                        <div id="btnLoader" class="hidden w-5 h-5 border-2 border-white/30 border-t-white rounded-full animate-spin ml-2"></div>
                    </button>
                </form>
                <div id="statusMessage" class="mt-4 hidden p-3 rounded-lg text-sm text-center"></div>
            </section>

            <!-- Data List Section -->
            <section class="bg-white p-8 rounded-2xl shadow-sm border border-slate-200">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-xl font-semibold flex items-center">
                        <svg class="w-5 h-5 mr-2 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 10h16M4 14h16M4 18h16"></path></svg>
                        Log History
                    </h2>
                    <button onclick="loadData()" title="Refresh Logs" class="p-2 text-slate-400 hover:text-blue-500 transition-colors rounded-full hover:bg-slate-100">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                    </button>
                </div>

                <div id="displayArea" class="space-y-4 max-h-[600px] overflow-y-auto pr-2 custom-scrollbar">
                    <div class="text-center py-10 text-slate-400">
                        <div class="w-12 h-12 bg-slate-100 rounded-full flex items-center justify-center mx-auto mb-3">
                             <svg class="w-6 h-6 text-slate-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"></path></svg>
                        </div>
                        <p>No data loaded yet.</p>
                    </div>
                </div>
            </section>
        </div>
    </div>

    <script>
        const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbzgsuA7_mjRWvpcuagCPKYlE91vxq0V2M4XGXT9udM3yLZ2mvr8TBL0eFYv7VvoVnpK/exec';

        // Elements
        const loginScreen = document.getElementById('loginScreen');
        const appContent = document.getElementById('appContent');
        const loginForm = document.getElementById('loginForm');
        const userForm = document.getElementById('userForm');
        
        // Activity form elements
        const typeSelect = document.getElementById('type');
        const distanceContainer = document.getElementById('distanceContainer');
        const distanceInput = document.getElementById('distance');
        const statusMsg = document.getElementById('statusMessage');
        const displayArea = document.getElementById('displayArea');

        // Login Logic
        loginForm.addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            const loader = document.getElementById('loginBtnLoader');
            const status = document.getElementById('loginStatus');

            btn.disabled = true;
            loader.classList.remove('hidden');
            status.classList.add('hidden');

            const hashPass = await hashPassword(document.getElementById('password').value);

            const payload = {
                action: 'login',
                adminId: document.getElementById('adminId').value,
                password: hashPass,
                status: '0001'
            };

            try {

                console.log('Login payload:', payload);
                const password = await hashPassword(payload.password);
                console.log('Hashed password:', password);


                const response = await fetch(WEB_APP_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    cache: 'no-cache',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const result = response.json();

                console.log('Login response:', result);

                // const response = await fetch(WEB_APP_URL, {
                //     method: 'POST',
                //     body: JSON.stringify(payload)
                // });
                // const result = await response.json();
                // const result = { result: 'success' }; // Mocked for testing without backend

                if (result.result === 'success') {
                    // const newToken = generateToken(20);
                    // console.log('Login successful, generated token:', newToken);
                    // // Sets a cookie that expires in 7 days
                    // const d = new Date();
                    // d.setTime(d.getTime() + (7*24*60*60*1000));
                    // let expires = "expires="+ d.toUTCString();

                    // document.cookie = "userToken=" + newToken + ";" + expires + ";path=/;SameSite=Strict";
                    // window.location.reload();
                } else {
                    status.textContent = 'Invalid credentials. Please check and try again.';
                    status.className = 'mt-4 p-3 rounded-lg text-sm text-center block bg-red-100 text-red-700';
                    status.classList.remove('hidden');
                }
            } catch (err) {
                console.error(err);
                status.textContent = 'Connection error. Make sure Apps Script is deployed as "Anyone".';
                status.className = 'mt-4 p-3 rounded-lg text-sm text-center block bg-red-100 text-red-700';
                status.classList.remove('hidden');
            } finally {
                btn.disabled = false;
                loader.classList.add('hidden');
            }
        });

        function logout() {
            loginScreen.classList.remove('hidden');
            appContent.classList.add('hidden');
            loginForm.reset();
        }
        function generateToken(length = 20) {
            const characters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
            let result = '';
            for (let i = 0; i < length; i++) {
                result += characters.charAt(Math.floor(Math.random() * characters.length));
            }
            return result;
        }

        async function hashPassword(password) {
            const encoder = new TextEncoder();
            const data = encoder.encode(password);
            const hashBuffer = await crypto.subtle.digest('SHA-256', data);
            
            // Convert buffer to hex string
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
            return hashHex;
        }

        // Initialize App Defaults
        const now = new Date();
        document.getElementById('date').valueAsDate = now;
        document.getElementById('time').value = now.toTimeString().substring(0, 5);

        function toggleDistanceVisibility() {
            const selectedType = typeSelect.value;
            if (['Walking', 'Running'].includes(selectedType)) {
                distanceContainer.classList.remove('hidden');
                distanceInput.required = true;
            } else {
                distanceContainer.classList.add('hidden');
                distanceInput.required = false;
                distanceInput.value = '';
            }
        }

        typeSelect.addEventListener('change', toggleDistanceVisibility);
        toggleDistanceVisibility();

        // Handle Submission
        userForm.addEventListener('submit', async function(e) {
            e.preventDefault();
            const submitBtn = document.getElementById('submitBtn');
            const btnText = document.getElementById('btnText');
            const btnLoader = document.getElementById('btnLoader');

            submitBtn.disabled = true;
            btnText.textContent = 'Saving strings...';
            btnLoader.classList.remove('hidden');

            const payload = {
                user: String(document.getElementById('user').value),
                type: String(document.getElementById('type').value),
                date: "'" + String(document.getElementById('date').value), // Forced Plain Text
                time: "'" + String(document.getElementById('time').value), // Forced Plain Text
                distance: distanceInput.value ? String(distanceInput.value) : '-'
            };

            try {
                await fetch(WEB_APP_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    cache: 'no-cache',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                showMessage('Activity successfully recorded as text!', 'success');
                userForm.reset();
                document.getElementById('date').valueAsDate = new Date();
                document.getElementById('time').value = new Date().toTimeString().substring(0, 5);
                toggleDistanceVisibility();
                setTimeout(loadData, 1000);
            } catch (error) {
                console.error('Error:', error);
                showMessage('Network error. Check console.', 'error');
            } finally {
                submitBtn.disabled = false;
                btnText.textContent = 'Save to Spreadsheet';
                btnLoader.classList.add('hidden');
            }
        });

        async function loadData() {
            displayArea.innerHTML = `
                <div class="flex flex-col items-center justify-center py-12 space-y-3">
                    <div class="w-10 h-10 border-4 border-slate-100 border-t-blue-500 rounded-full animate-spin"></div>
                    <span class="text-xs font-medium text-slate-400">Syncing with Sheets...</span>
                </div>`;

            try {
                const response = await fetch(WEB_APP_URL);
                const data = await response.json();
                renderData(data);
            } catch (error) {
                console.error('Fetch error:', error);
                displayArea.innerHTML = `<p class="text-red-500 text-center py-10 text-sm">Error connecting to database.</p>`;
            }
        }

        function renderData(rows) {
            const validRows = rows.filter(row => row && row.length >= 4 && row[0] !== 'User');
            if (validRows.length === 0) {
                displayArea.innerHTML = `<p class="text-slate-400 text-center py-10 text-sm">The history is currently empty.</p>`;
                return;
            }

            const sortedRows = [...validRows].reverse();
            displayArea.innerHTML = sortedRows.map(row => {
                const userName = String(row[1]); 
                const activityType = String(row[2]);
                const activityDate = String(row[3]).replace(/^'/, '');
                const activityTime = String(row[4]).replace(/^'/, '');
                const distanceValue = String(row[5] || '-');
                
                const isCardio = ['Walking', 'Running'].includes(activityType);
                const userColorClass = userName === 'Wife' ? 'bg-pink-100 text-pink-700' : 'bg-blue-100 text-blue-700';

                return `
                <div class="p-4 bg-white border border-slate-100 rounded-xl hover:border-slate-300 hover:shadow-md transition-all group">
                    <div class="flex justify-between items-start mb-2">
                        <span class="px-2 py-0.5 ${userColorClass} text-[10px] font-bold rounded uppercase tracking-wider">${userName}</span>
                        <div class="text-right text-[10px] text-slate-400 font-medium">${activityDate}</div>
                    </div>
                    <div class="flex items-end justify-between">
                        <div>
                            <span class="block text-xs text-slate-400 uppercase font-semibold tracking-tight">Activity</span>
                            <span class="font-bold text-slate-800 text-lg">${activityType}</span>
                        </div>
                        ${isCardio && distanceValue !== '-' ? `
                            <div class="text-right text-blue-600 font-black text-xl">
                                ${distanceValue} <span class="text-[10px] text-slate-400 font-normal ml-0.5">KM (${activityTime})</span>
                            </div>
                        ` : `
                            <div class="text-right text-blue-600 font-black text-xl">${activityTime}</div>
                        `}
                    </div>
                </div>`;
            }).join('');
        }

        function showMessage(text, type) {
            statusMsg.textContent = text;
            statusMsg.className = `mt-4 p-3 rounded-lg text-sm text-center block font-medium ${
                type === 'success' ? 'bg-green-50 text-green-700 border border-green-100' : 'bg-red-50 text-red-700 border border-red-100'
            }`;
            setTimeout(() => statusMsg.classList.add('hidden'), 5000);
            statusMsg.classList.remove('hidden');
        }
    </script>
</body>
</html>
