<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SheetDB Connect</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        
        .loader {
            border-top-color: #3b82f6;
            animation: spinner 1.5s linear infinite;
        }
        @keyframes spinner {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-900">

    <div class="max-w-4xl mx-auto px-4 py-12">
        <header class="text-center mb-12">
            <h1 class="text-4xl font-bold tracking-tight text-slate-800">SheetDB Manager</h1>
            <p class="mt-3 text-slate-500">Submit data to Google Sheets and view entries in real-time.</p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <!-- Form Section -->
            <section class="bg-white p-8 rounded-2xl shadow-sm border border-slate-200">
                <h2 class="text-xl font-semibold mb-6 flex items-center">
                    <svg class="w-5 h-5 mr-2 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg>
                    New Entry
                </h2>
                <form id="userForm" class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Full Name</label>
                        <input type="text" id="name" required class="w-full px-4 py-2 rounded-lg border border-slate-300 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition" placeholder="John Doe">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Email Address</label>
                        <input type="email" id="email" required class="w-full px-4 py-2 rounded-lg border border-slate-300 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition" placeholder="john@example.com">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Message</label>
                        <textarea id="message" rows="3" required class="w-full px-4 py-2 rounded-lg border border-slate-300 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition" placeholder="Your notes here..."></textarea>
                    </div>
                    <button type="submit" id="submitBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-lg transition shadow-md hover:shadow-lg flex items-center justify-center">
                        <span id="btnText">Save to Spreadsheet</span>
                        <div id="btnLoader" class="hidden w-5 h-5 border-2 border-white/30 border-t-white rounded-full animate-spin ml-2"></div>
                    </button>
                </form>
                <div id="statusMessage" class="mt-4 hidden p-3 rounded-lg text-sm text-center"></div>
            </section>

            <!-- Data List Section -->
            <section class="bg-white p-8 rounded-2xl shadow-sm border border-slate-200">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-xl font-semibold flex items-center">
                        <svg class="w-5 h-5 mr-2 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 10h16M4 14h16M4 18h16"></path></svg>
                        Database Logs
                    </h2>
                    <button onclick="loadData()" class="p-2 text-slate-400 hover:text-blue-500 transition-colors rounded-full hover:bg-slate-100">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                    </button>
                </div>

                <div id="displayArea" class="space-y-4 max-h-[400px] overflow-y-auto pr-2 custom-scrollbar">
                    <div class="text-center py-10 text-slate-400">
                        <p>No data loaded yet.</p>
                        <p class="text-xs">Click refresh or submit a form.</p>
                    </div>
                </div>
            </section>
        </div>
    </div>

    <script>
        /**
         * PASTE YOUR GOOGLE APPS SCRIPT WEB APP URL HERE
         */
        const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycby3Tu7WQ5_kO2xkdYa8tKn7b6y7W4hm7jIIf2gARKAPM5MfZrHl2YN6bsnPjNOvvp0d/exec';

        const form = document.getElementById('userForm');
        const submitBtn = document.getElementById('submitBtn');
        const btnText = document.getElementById('btnText');
        const btnLoader = document.getElementById('btnLoader');
        const statusMsg = document.getElementById('statusMessage');
        const displayArea = document.getElementById('displayArea');

        // Handle Submission
        form.addEventListener('submit', async function(e) {
            e.preventDefault();
            
            if (WEB_APP_URL.includes('YOUR_WEB_APP_URL')) {
                showMessage('Please provide a valid Web App URL in the script section.', 'error');
                return;
            }

            setLoading(true);
            
            const payload = {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                message: document.getElementById('message').value
            };

            try {
                // Apps Script with 'no-cors' mode
                // Note: fetch will return 'opaque' type and you can't read the response body, 
                // but the request will still succeed if the script works.
                await fetch(WEB_APP_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    cache: 'no-cache',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                showMessage('Data successfully saved!', 'success');
                form.reset();
                setTimeout(loadData, 1000); // Auto refresh after 1 second

            } catch (error) {
                console.error('Error:', error);
                showMessage('Connection error. Is the URL correct?', 'error');
            } finally {
                setLoading(false);
            }
        });

        // Load Data from Script (doGet)
        async function loadData() {
            if (WEB_APP_URL.includes('YOUR_WEB_APP_URL')) return;

            displayArea.innerHTML = `
                <div class="flex flex-col items-center justify-center py-10 space-y-3">
                    <div class="w-8 h-8 border-4 border-blue-100 border-t-blue-500 rounded-full animate-spin"></div>
                    <span class="text-sm text-slate-400">Fetching entries...</span>
                </div>`;

            try {
                const response = await fetch(WEB_APP_URL);
                const data = await response.json();
                
                renderData(data);
            } catch (error) {
                console.error('Fetch error:', error);
                displayArea.innerHTML = `<p class="text-red-500 text-center py-10">Failed to fetch data.</p>`;
            }
        }

        function renderData(rows) {
            if (!rows || rows.length === 0) {
                displayArea.innerHTML = `<p class="text-slate-400 text-center py-10 text-sm">Spreadsheet is empty.</p>`;
                return;
            }

            displayArea.innerHTML = rows.map(row => `
                <div class="p-4 bg-slate-50 border border-slate-100 rounded-xl hover:bg-slate-100 transition-colors">
                    <div class="flex justify-between items-start mb-1">
                        <span class="font-bold text-slate-800">${row[1] || 'Unknown'}</span>
                        <span class="text-[10px] text-slate-400 uppercase tracking-widest">${new Date(row[0]).toLocaleDateString() || ''}</span>
                    </div>
                    <div class="text-xs text-blue-500 mb-2">${row[2] || ''}</div>
                    <p class="text-sm text-slate-600 line-clamp-2 italic">"${row[3] || 'No message'}"</p>
                </div>
            `).join('');
        }

        function setLoading(isLoading) {
            submitBtn.disabled = isLoading;
            if (isLoading) {
                btnText.textContent = 'Processing...';
                btnLoader.classList.remove('hidden');
                submitBtn.classList.add('opacity-80', 'cursor-not-allowed');
            } else {
                btnText.textContent = 'Save to Spreadsheet';
                btnLoader.classList.add('hidden');
                submitBtn.classList.remove('opacity-80', 'cursor-not-allowed');
            }
        }

        function showMessage(text, type) {
            statusMsg.textContent = text;
            statusMsg.className = `mt-4 p-3 rounded-lg text-sm text-center block ${
                type === 'success' ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'
            }`;
            setTimeout(() => statusMsg.classList.add('hidden'), 5000);
        }
    </script>
</body>
</html>
