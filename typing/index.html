<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Space Typing Defender</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Inter:wght@400;700&display=swap"
        rel="stylesheet">

    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: linear-gradient(135deg, #1e1345 0%, #4a235a 50%, #154360 100%);
            color: white;
            font-family: 'Inter', sans-serif;
            touch-action: none;
            /* Prevent zooming on mobile */
        }

        h1,
        .game-font {
            font-family: 'Fredoka One', cursive;
        }

        /* Starry background */
        .stars {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: -2;
            background-image:
                radial-gradient(2px 2px at 20px 30px, #ffffff, rgba(0, 0, 0, 0)),
                radial-gradient(3px 3px at 40px 70px, #fff3e0, rgba(0, 0, 0, 0)),
                radial-gradient(2px 2px at 50px 160px, #e1f5fe, rgba(0, 0, 0, 0)),
                radial-gradient(3px 3px at 90px 40px, #ffffff, rgba(0, 0, 0, 0)),
                radial-gradient(2px 2px at 130px 80px, #fff3e0, rgba(0, 0, 0, 0)),
                radial-gradient(3px 3px at 160px 120px, #e1f5fe, rgba(0, 0, 0, 0));
            background-repeat: repeat;
            background-size: 200px 200px;
            animation: starsMove 150s linear infinite;
        }

        @keyframes starsMove {
            from {
                background-position: 0 0;
            }

            to {
                background-position: 0 1000px;
            }
        }

        /* Kid-Friendly Solar System Planets */
        .planet {
            position: absolute;
            border-radius: 50%;
            z-index: -1;
            opacity: 0.85;
            animation: floatPlanet 15s ease-in-out infinite;
        }

        .planet-mercury {
            width: 40px;
            height: 40px;
            background: radial-gradient(circle at 30% 30%, #d4c8c1 0%, #8c7c73 100%);
            top: 10%;
            left: 8%;
            box-shadow: 0 0 15px rgba(212, 200, 193, 0.4), inset -5px -5px 10px rgba(0, 0, 0, 0.2);
            animation-duration: 11s;
        }

        .planet-venus {
            width: 60px;
            height: 60px;
            background: radial-gradient(circle at 30% 30%, #ffcc80 0%, #e65100 100%);
            top: 25%;
            right: 12%;
            box-shadow: 0 0 20px rgba(255, 204, 128, 0.4), inset -8px -8px 15px rgba(0, 0, 0, 0.2);
            animation-duration: 14s;
            animation-delay: -2s;
        }

        /* Earth Base at the bottom */
        #earth-base {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            width: 180vw;
            height: 180vw;
            bottom: calc(25vh - 180vw);
            border-radius: 50%;
            background-color: #0b1a2e;
            background-image: url('https://upload.wikimedia.org/wikipedia/commons/c/cd/Land_ocean_ice_2048.jpg');
            background-size: cover;
            background-position: center top;
            z-index: 5;
            box-shadow: 0 -15px 50px rgba(52, 152, 219, 0.8), inset 0 40px 120px rgba(0, 0, 0, 0.9);
            border-top: 3px solid rgba(135, 206, 235, 0.6);
        }

        @media (min-width: 768px) {
            #earth-base {
                width: 120vw;
                height: 120vw;
                bottom: calc(30vh - 120vw);
            }
        }

        .planet-mars {
            width: 50px;
            height: 50px;
            background: radial-gradient(circle at 30% 30%, #ff758c 0%, #c62828 100%);
            top: 50%;
            left: 25%;
            box-shadow: 0 0 20px rgba(255, 117, 140, 0.4), inset -6px -6px 12px rgba(0, 0, 0, 0.2);
            animation-duration: 13s;
            animation-delay: -7s;
        }

        .planet-jupiter {
            width: 140px;
            height: 140px;
            background: linear-gradient(170deg, #f6d365 0%, #f6d365 20%, #fda085 20%, #fda085 40%, #e65100 40%, #e65100 50%, #fda085 50%, #fda085 75%, #f6d365 75%, #f6d365 100%);
            bottom: 12%;
            right: 8%;
            box-shadow: 0 0 35px rgba(246, 211, 101, 0.4), inset -15px -15px 25px rgba(0, 0, 0, 0.4);
            animation-duration: 20s;
            animation-delay: -1s;
        }

        .planet-saturn {
            width: 110px;
            height: 110px;
            background: radial-gradient(circle at 30% 30%, #f7e0a3 0%, #d4b56a 100%);
            top: 15%;
            left: 45%;
            box-shadow: 0 0 30px rgba(247, 224, 163, 0.4), inset -12px -12px 20px rgba(0, 0, 0, 0.3);
            animation-duration: 18s;
            animation-delay: -9s;
        }

        .ring-saturn {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 170%;
            height: 35%;
            border: 15px solid rgba(255, 236, 179, 0.7);
            border-radius: 50%;
            transform: translate(-50%, -50%) rotate(20deg);
            box-shadow: 0 0 15px rgba(255, 236, 179, 0.5);
        }

        .planet-uranus {
            width: 70px;
            height: 70px;
            background: radial-gradient(circle at 30% 30%, #e0c3fc 0%, #8ec5fc 100%);
            bottom: 35%;
            right: 35%;
            box-shadow: 0 0 25px rgba(142, 197, 252, 0.4), inset -8px -8px 15px rgba(0, 0, 0, 0.2);
            animation-duration: 15s;
            animation-delay: -11s;
        }

        .ring-uranus {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 140%;
            height: 15%;
            border: 6px solid rgba(224, 195, 252, 0.5);
            border-radius: 50%;
            transform: translate(-50%, -50%) rotate(75deg);
        }

        .planet-neptune {
            width: 75px;
            height: 75px;
            background: radial-gradient(circle at 30% 30%, #4facfe 0%, #000428 100%);
            top: 60%;
            left: 60%;
            box-shadow: 0 0 25px rgba(79, 172, 254, 0.4), inset -10px -10px 15px rgba(0, 0, 0, 0.3);
            animation-duration: 17s;
            animation-delay: -4s;
        }

        @keyframes floatPlanet {

            0%,
            100% {
                transform: translateY(0) rotate(0deg);
            }

            50% {
                transform: translateY(-30px) rotate(5deg);
            }
        }

        /* Falling words styling */
        .falling-word {
            position: absolute;
            font-size: 1.5rem;
            font-weight: bold;
            padding: 0.5rem 1rem;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 1rem;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3), inset 0 0 10px rgba(255, 255, 255, 0.1);
            transition: top 0.1s linear, background-color 0.2s, border-color 0.2s, transform 0.1s;
            text-align: center;
            backdrop-filter: blur(4px);
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* Alien Clipart Animation */
        .alien-clipart {
            font-size: 3rem;
            line-height: 1;
            margin-bottom: 0.25rem;
            filter: drop-shadow(0 0 8px rgba(255, 255, 255, 0.3));
            animation: wiggle 2s ease-in-out infinite;
        }

        @keyframes wiggle {

            0%,
            100% {
                transform: rotate(-10deg) scale(1);
            }

            50% {
                transform: rotate(10deg) scale(1.1);
            }
        }

        /* Highlight matching prefix */
        .match-highlight {
            color: #39FF14;
            /* Neon green */
            text-shadow: 0 0 10px #39FF14;
        }

        /* Laser beam */
        .laser {
            position: absolute;
            width: 4px;
            background-color: #00F0FF;
            box-shadow: 0 0 10px #00F0FF, 0 0 20px #00F0FF;
            z-index: 5;
            transform-origin: bottom center;
            opacity: 0;
            animation: laserFlash 0.3s ease-out forwards;
        }

        @keyframes laserFlash {
            0% {
                opacity: 1;
                width: 6px;
            }

            50% {
                opacity: 1;
                width: 4px;
            }

            100% {
                opacity: 0;
                width: 0px;
            }
        }

        /* Explosion particles */
        .particle {
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
            z-index: 20;
        }

        /* Screens */
        .screen {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(11, 11, 42, 0.7);
            z-index: 50;
            backdrop-filter: blur(8px);
        }

        .hidden {
            display: none !important;
        }

        /* Shaking effect for losing a life */
        .shake {
            animation: shake 0.5s cubic-bezier(.36, .07, .19, .97) both;
        }

        @keyframes shake {

            10%,
            90% {
                transform: translate3d(-1px, 0, 0);
            }

            20%,
            80% {
                transform: translate3d(2px, 0, 0);
            }

            30%,
            50%,
            70% {
                transform: translate3d(-4px, 0, 0);
            }

            40%,
            60% {
                transform: translate3d(4px, 0, 0);
            }
        }

        #type-input {
            background: rgba(0, 0, 0, 0.5);
            border: 2px solid #4F46E5;
            color: #00F0FF;
            text-shadow: 0 0 5px #00F0FF;
        }

        #type-input:focus {
            outline: none;
            border-color: #00F0FF;
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.5);
        }
    </style>
</head>

<body class="flex flex-col h-screen w-screen overflow-hidden text-white" id="game-body">

    <!-- Earth Base at the bottom -->
    <div id="earth-base"></div>

    <!-- Decorative Kid-Friendly Solar System -->
    <div class="stars"></div>
    <div class="planet planet-mercury"></div>
    <div class="planet planet-venus"></div>
    <div class="planet planet-mars"></div>
    <div class="planet planet-jupiter"></div>
    <div class="planet planet-saturn">
        <div class="ring-saturn"></div>
    </div>
    <div class="planet planet-uranus">
        <div class="ring-uranus"></div>
    </div>
    <div class="planet planet-neptune"></div>

    <!-- Start Screen -->
    <div id="start-screen" class="screen">
        <h1 class="text-5xl md:text-7xl mb-4 text-transparent bg-clip-text bg-gradient-to-r from-blue-300 to-purple-400 game-font text-center px-4"
            style="-webkit-text-stroke: 1px white;">
            Space Typing<br>Defender
        </h1>
        <p class="text-xl mb-8 text-blue-100 text-center px-4 max-w-md">
            Protect Earth! Type the words falling from the sky to shoot down the aliens with your laser.
        </p>

        <div class="flex flex-col md:flex-row gap-4 mt-4">
            <button id="btn-easy"
                class="game-font text-xl px-6 py-3 bg-gradient-to-r from-green-500 to-emerald-500 hover:from-green-400 hover:to-emerald-400 rounded-full shadow-[0_0_15px_rgba(16,185,129,0.5)] transform hover:scale-105 transition-all cursor-pointer border-2 border-white/20">
                EASY (Slow 🐢)
            </button>
            <button id="btn-medium"
                class="game-font text-xl px-6 py-3 bg-gradient-to-r from-blue-500 to-indigo-500 hover:from-blue-400 hover:to-indigo-400 rounded-full shadow-[0_0_15px_rgba(59,130,246,0.5)] transform hover:scale-105 transition-all cursor-pointer border-2 border-white/20">
                MEDIUM (Normal 🚶)
            </button>
            <button id="btn-hard"
                class="game-font text-xl px-6 py-3 bg-gradient-to-r from-red-500 to-rose-500 hover:from-red-400 hover:to-rose-400 rounded-full shadow-[0_0_15px_rgba(239,68,68,0.5)] transform hover:scale-105 transition-all cursor-pointer border-2 border-white/20">
                HARD (Fast 🚀)
            </button>
        </div>
    </div>

    <!-- Game Over Screen -->
    <div id="game-over-screen" class="screen hidden">
        <h1 class="text-6xl md:text-7xl mb-2 text-red-500 game-font text-center" style="text-shadow: 0 0 20px red;">
            GAME OVER
        </h1>
        <p class="text-3xl mb-8 text-white game-font">
            Score: <span id="final-score" class="text-yellow-400">0</span>
        </p>

        <div class="flex flex-col md:flex-row gap-4">
            <button id="restart-btn"
                class="game-font text-2xl px-8 py-4 bg-gradient-to-r from-green-600 to-emerald-600 hover:from-green-500 hover:to-emerald-500 rounded-full shadow-[0_0_20px_rgba(16,185,129,0.5)] transform hover:scale-105 transition-all cursor-pointer border-2 border-white/20">
                PLAY AGAIN 🔄
            </button>
            <button id="menu-btn"
                class="game-font text-2xl px-8 py-4 bg-gradient-to-r from-purple-600 to-pink-600 hover:from-purple-500 hover:to-pink-500 rounded-full shadow-[0_0_20px_rgba(168,85,247,0.5)] transform hover:scale-105 transition-all cursor-pointer border-2 border-white/20">
                MENU 🔙
            </button>
        </div>
    </div>

    <!-- Main Game UI -->
    <div class="relative w-full h-full flex flex-col pointer-events-none">

        <!-- Header: Score and Lives -->
        <header class="flex justify-between items-center p-4 md:p-6 z-20">
            <div
                class="flex items-center gap-3 bg-black/40 px-4 py-2 rounded-2xl border border-indigo-500/50 backdrop-blur-sm">
                <span class="text-2xl">⭐</span>
                <div class="game-font text-xl md:text-3xl tracking-wider text-yellow-400">
                    SCORE: <span id="score">0</span>
                </div>
            </div>
            <div
                class="flex items-center gap-2 bg-black/40 px-4 py-2 rounded-2xl border border-red-500/50 backdrop-blur-sm">
                <span class="text-xl md:text-2xl game-font text-white">LIVES:</span>
                <div id="lives" class="flex gap-1 text-2xl md:text-3xl text-red-500">
                    ❤️ ❤️ ❤️
                </div>
            </div>
        </header>

        <!-- Game Canvas (Words fall here) -->
        <div id="game-container" class="flex-grow relative overflow-hidden">
            <!-- Words and lasers injected here -->
        </div>

        <!-- Footer: Typing Input Area -->
        <footer class="p-4 md:p-8 flex flex-col items-center justify-end z-20 pointer-events-auto">
            <!-- Base Station / Turret Graphic -->
            <div id="turret"
                class="w-32 h-40 md:w-40 md:h-52 flex items-end justify-center mb-[-10px] z-10 transition-transform duration-100 hover:scale-105">
                <img src="../assets/ptk-BJKZN014.png" alt="Space Defender"
                    class="w-full h-full object-cover rounded-2xl border-4 border-cyan-400 shadow-[0_0_20px_rgba(0,240,255,0.8)]"
                    onerror="this.onerror=null; this.src='https://placehold.co/150x200/0B0B2A/00F0FF?text=Defender'">
            </div>

            <div class="w-full max-w-md relative z-20 mt-4">
                <input type="text" id="type-input" autocomplete="off" spellcheck="false"
                    placeholder="Type words here..."
                    class="w-full text-center text-3xl md:text-4xl py-4 px-6 rounded-2xl shadow-lg game-font transition-all bg-black/60 backdrop-blur-md">
            </div>
        </footer>
    </div>

    <script>
        // Setup Audio Context for procedural sound effects
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx;

        // Background Music State
        let bgmGainNode = null;
        let bgmTimerID = null;
        let nextNoteTime = 0;
        let currentNoteIndex = 0;
        const bgmSequence = [
            261.63, 329.63, 392.00, 523.25, // C4, E4, G4, C5
            261.63, 329.63, 392.00, 523.25,
            349.23, 440.00, 523.25, 698.46, // F4, A4, C5, F5
            392.00, 493.88, 587.33, 783.99, // G4, B4, D5, G5
        ];

        // Kid-friendly word dictionary categorized by length
        // const wordDictionary = [
        //     // Short (3-4 letters)
        //     "cat", "dog", "sun", "sky", "car", "bus", "red", "blue", "fly", "jump", 
        //     "run", "star", "moon", "tree", "bird", "fish", "play", "fun", "toy", "game",
        //     "hat", "bat", "ball", "bear", "lion", "tiger", "frog", "duck", "cow", "pig",
        //     // Medium (5-6 letters)
        //     "apple", "grape", "melon", "water", "earth", "space", "alien", "robot", "laser", 
        //     "rocket", "planet", "comet", "happy", "smile", "laugh", "dance", "friend", "school",
        //     "house", "mouse", "train", "plane", "candy", "cookie", "orange", "yellow", "purple",
        //     // Long (7+ letters)
        //     "elephant", "dinosaur", "astronaut", "spaceship", "universe", "beautiful",
        //     "butterfly", "chocolate", "icecream", "sunshine", "adventure", "treasure"
        // ];
        const wordDictionary = [
            // Short (3-4 letters)
            "a", "b", "c", "d", "e", "f", "g", "h", "i", "j",
            "k", "l", "m", "n", "o", "p", "q", "r", "s", "t",
            "u", "v", "w", "x", "y", "z"
        ];

        // Game Elements
        const startScreen = document.getElementById('start-screen');
        const gameOverScreen = document.getElementById('game-over-screen');
        const gameContainer = document.getElementById('game-container');
        const btnEasy = document.getElementById('btn-easy');
        const btnMedium = document.getElementById('btn-medium');
        const btnHard = document.getElementById('btn-hard');
        const restartBtn = document.getElementById('restart-btn');
        const menuBtn = document.getElementById('menu-btn');
        const typeInput = document.getElementById('type-input');
        const scoreElement = document.getElementById('score');
        const livesElement = document.getElementById('lives');
        const finalScoreElement = document.getElementById('final-score');
        const turret = document.getElementById('turret');
        const gameBody = document.getElementById('game-body');

        // Game State
        let score = 0;
        let lives = 3;
        let isPlaying = false;
        let activeWords = []; // Array of { id, text, element, x, y, speed }
        let wordIdCounter = 0;
        let gameLoopRef;
        let spawnIntervalRef;

        // Difficulty Levels configuration
        const difficultyLevels = {
            easy: { baseSpeed: 0.35, spawnRate: 4000 },
            medium: { baseSpeed: 1.0, spawnRate: 2500 },
            hard: { baseSpeed: 1.8, spawnRate: 1500 }
        };
        let currentDifficulty = 'medium';

        let baseSpeed = 1.0;
        let spawnRate = 2500; // ms between spawns
        let lastTime = 0;

        // Colors for words
        const wordColors = [
            { bg: 'rgba(239, 68, 68, 0.4)', border: 'rgba(239, 68, 68, 0.8)' },    // Red
            { bg: 'rgba(59, 130, 246, 0.4)', border: 'rgba(59, 130, 246, 0.8)' },  // Blue
            { bg: 'rgba(16, 185, 129, 0.4)', border: 'rgba(16, 185, 129, 0.8)' },  // Green
            { bg: 'rgba(245, 158, 11, 0.4)', border: 'rgba(245, 158, 11, 0.8)' },  // Yellow
            { bg: 'rgba(168, 85, 247, 0.4)', border: 'rgba(168, 85, 247, 0.8)' }   // Purple
        ];


        // Random helper functions
        const randomInt = (min, max) => Math.floor(Math.random() * (max - min + 1)) + min;
        const randomItem = (arr) => arr[randomInt(0, arr.length - 1)];

        // Select a word based on current score (harder words as score increases)
        function getNextWord() {
            let filteredList;
            if (score < 100) {
                filteredList = wordDictionary.filter(w => w.length <= 4);
            } else if (score < 300) {
                filteredList = wordDictionary.filter(w => w.length <= 6);
            } else {
                filteredList = wordDictionary;
            }
            return randomItem(filteredList);
        }

        // --- AUDIO FUNCTIONS ---

        function initAudioContext() {
            if (!audioCtx) {
                audioCtx = new AudioContext();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        // Procedural Upbeat Background Music (Retro 8-bit style)
        function scheduleBGM() {
            if (!bgmGainNode) return;
            // Schedule notes a little bit ahead of current time to ensure smooth playback
            while (nextNoteTime < audioCtx.currentTime + 0.1) {
                playBGMNote(bgmSequence[currentNoteIndex], nextNoteTime);
                nextNoteTime += 0.2; // 0.2 seconds per note (tempo)
                currentNoteIndex = (currentNoteIndex + 1) % bgmSequence.length;
            }
            bgmTimerID = requestAnimationFrame(scheduleBGM);
        }

        function playBGMNote(frequency, time) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();

            osc.type = 'square'; // retro 8-bit style sound
            osc.frequency.setValueAtTime(frequency, time);

            // Pluck envelope for bouncy sound
            gain.gain.setValueAtTime(0, time);
            gain.gain.linearRampToValueAtTime(0.04, time + 0.02); // Keep volume kid-friendly
            gain.gain.exponentialRampToValueAtTime(0.001, time + 0.18);

            osc.connect(gain);
            gain.connect(bgmGainNode);

            osc.start(time);
            osc.stop(time + 0.2);
        }

        function startBGM() {
            initAudioContext();
            stopBGM(); // clear any existing BGM

            bgmGainNode = audioCtx.createGain();
            bgmGainNode.connect(audioCtx.destination);

            // Fade in BGM gently
            bgmGainNode.gain.setValueAtTime(0, audioCtx.currentTime);
            bgmGainNode.gain.linearRampToValueAtTime(1, audioCtx.currentTime + 1);

            nextNoteTime = audioCtx.currentTime + 0.1;
            currentNoteIndex = 0;
            scheduleBGM();
        }

        function stopBGM() {
            if (bgmTimerID) {
                cancelAnimationFrame(bgmTimerID);
                bgmTimerID = null;
            }
            if (bgmGainNode) {
                // Fade out smoothly
                bgmGainNode.gain.cancelScheduledValues(audioCtx.currentTime);
                bgmGainNode.gain.setValueAtTime(bgmGainNode.gain.value, audioCtx.currentTime);
                bgmGainNode.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 1);

                const oldGain = bgmGainNode;
                bgmGainNode = null;
                setTimeout(() => oldGain.disconnect(), 1000);
            }
        }

        // Generate retro laser pew sound
        function playLaserSound() {
            initAudioContext();

            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();

            oscillator.type = 'square';

            // Sweep frequency down quickly to sound like a laser "pew"
            oscillator.frequency.setValueAtTime(880, audioCtx.currentTime);
            oscillator.frequency.exponentialRampToValueAtTime(110, audioCtx.currentTime + 0.1);

            // Fade out the sound quickly
            gainNode.gain.setValueAtTime(0.15, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);

            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            oscillator.start();
            oscillator.stop(audioCtx.currentTime + 0.1);
        }


        // --- GAME LOGIC ---

        function spawnWord() {
            if (!isPlaying) return;

            const text = getNextWord();
            const id = `word-${wordIdCounter++}`;
            const el = document.createElement('div');

            // Random kid-friendly alien clipart (using emojis as SVGs)
            const alienIcons = ['👾', '👽', '🛸', '🤖', '🐙', '🦠'];
            const icon = randomItem(alienIcons);

            // Styling the word element
            el.id = id;
            el.className = 'falling-word game-font';
            el.innerHTML = `
                <div class="alien-clipart">${icon}</div>
                <div class="word-text">${text}</div>
            `;

            // Random styling
            const colorTheme = randomItem(wordColors);
            el.style.backgroundColor = colorTheme.bg;
            el.style.borderColor = colorTheme.border;

            // Positioning logic to prevent spawning completely off-screen
            gameContainer.appendChild(el);

            // Calculate max width after appending to know its true size
            const rect = el.getBoundingClientRect();
            const minX = 20;
            const maxX = gameContainer.clientWidth - rect.width - 20;
            const startX = randomInt(minX, maxX);

            el.style.left = `${startX}px`;
            el.style.top = `-50px`; // Start above screen

            // Calculate speed (slightly randomized, increasing with score)
            let speedMultiplier = 1 + (score / 500); // Default scaling
            if (currentDifficulty === 'easy') {
                speedMultiplier = 1 + (score / 1500); // Scale much slower on easy
            } else if (currentDifficulty === 'hard') {
                speedMultiplier = 1 + (score / 300); // Scale faster on hard
            }

            // Apply speed setting
            const individualSpeed = (baseSpeed * speedMultiplier) + (Math.random() * 0.4 * baseSpeed);

            activeWords.push({
                id: id,
                text: text,
                element: el,
                x: startX,
                y: -50,
                speed: individualSpeed
            });

            // Gradually decrease spawn rate (make it faster)
            let minSpawnRate = 800;
            if (currentDifficulty === 'easy') minSpawnRate = 1800; // Don't let it get too chaotic on easy
            if (currentDifficulty === 'hard') minSpawnRate = 400;  // Very fast on hard

            if (spawnRate > minSpawnRate) {
                spawnRate -= 20;
                clearInterval(spawnIntervalRef);
                spawnIntervalRef = setInterval(spawnWord, spawnRate);
            }
        }

        function gameLoop(timestamp) {
            if (!isPlaying) return;

            // Calculate delta time for smooth movement regardless of framerate
            if (!lastTime) lastTime = timestamp;
            const deltaTime = timestamp - lastTime;
            lastTime = timestamp;

            const speedAdjust = deltaTime / 16.66; // Normalize to ~60fps

            // Iterate backwards so we can safely remove items
            for (let i = activeWords.length - 1; i >= 0; i--) {
                const wordObj = activeWords[i];

                // Move down
                wordObj.y += wordObj.speed * speedAdjust;
                wordObj.element.style.transform = `translateY(${wordObj.y}px)`;

                // Check collision with bottom of container
                const containerHeight = gameContainer.clientHeight;

                if (wordObj.y > containerHeight) {
                    // Missed the word!
                    loseLife();
                    removeWord(i);
                }
            }

            if (isPlaying) {
                gameLoopRef = requestAnimationFrame(gameLoop);
            }
        }


        // Keep focus on input field always (kid-friendly, no clicking needed)
        document.addEventListener('click', () => {
            if (isPlaying) typeInput.focus();
        });

        typeInput.addEventListener('input', (e) => {
            if (!isPlaying) return;

            const currentInput = e.target.value.toLowerCase().trim();

            // Check for perfect match first
            let matchFound = false;

            for (let i = 0; i < activeWords.length; i++) {
                if (activeWords[i].text === currentInput) {
                    // Match found!
                    shootWord(i);
                    typeInput.value = '';
                    matchFound = true;
                    break; // Only destroy one at a time
                }
            }

            // Update highlighting for partial matches
            if (!matchFound) {
                updateHighlighting(currentInput);
            } else {
                updateHighlighting(''); // Clear highlights if matched
            }
        });

        // Highlight letters as the kid types
        function updateHighlighting(inputString) {
            activeWords.forEach(wordObj => {
                const textContainer = wordObj.element.querySelector('.word-text');

                if (inputString.length > 0 && wordObj.text.startsWith(inputString)) {
                    // Has matching prefix
                    const matchedPart = wordObj.text.substring(0, inputString.length);
                    const restPart = wordObj.text.substring(inputString.length);
                    textContainer.innerHTML = `<span class="match-highlight">${matchedPart}</span>${restPart}`;
                    wordObj.element.style.transform = `translateY(${wordObj.y}px) scale(1.1)`; // Pop slightly
                    wordObj.element.style.borderColor = '#39FF14'; // Neon green border
                } else {
                    // No match
                    textContainer.innerHTML = wordObj.text;
                    wordObj.element.style.transform = `translateY(${wordObj.y}px) scale(1.0)`;
                    // Reset border color to original inline style or fallback
                    wordObj.element.style.borderColor = '';
                }
            });
        }


        function shootWord(index) {
            const wordObj = activeWords[index];
            const targetRect = wordObj.element.getBoundingClientRect();
            const turretRect = turret.getBoundingClientRect();

            // Play the laser sound effect
            playLaserSound();

            // Calculate center points
            const targetX = targetRect.left + (targetRect.width / 2);
            const targetY = targetRect.top + (targetRect.height / 2);
            const startX = turretRect.left + (turretRect.width / 2);
            const startY = turretRect.top;

            // Draw laser
            createLaser(startX, startY, targetX, targetY);

            // Create explosion
            createExplosion(targetX, targetY, wordObj.text);

            // Update score
            score += wordObj.text.length * 10;
            scoreElement.innerText = score;

            // Visual pop on score
            scoreElement.style.transform = 'scale(1.5)';
            scoreElement.style.color = '#39FF14';
            setTimeout(() => {
                scoreElement.style.transform = 'scale(1)';
                scoreElement.style.color = '#FBBF24'; // back to yellow
            }, 200);

            // Remove word
            removeWord(index);
        }

        function createLaser(startX, startY, targetX, targetY) {
            const laser = document.createElement('div');
            laser.className = 'laser';

            // Calculate distance and angle
            const dx = targetX - startX;
            const dy = targetY - startY;
            const distance = Math.sqrt(dx * dx + dy * dy);
            const angle = Math.atan2(dy, dx) * (180 / Math.PI) + 90; // +90 because div expands upwards/downwards typically, but we use transform-origin bottom

            // Set positions
            laser.style.height = `${distance}px`;
            laser.style.left = `${startX}px`;
            laser.style.top = `${startY - distance}px`;

            // Rotate to point at target
            laser.style.transform = `rotate(${angle}deg)`;

            document.body.appendChild(laser);

            // Remove after animation
            setTimeout(() => {
                laser.remove();
            }, 300);
        }

        function createExplosion(x, y, text) {
            // Number of particles based on word length
            const count = text.length * 3;
            const colors = ['#39FF14', '#00F0FF', '#FBBF24', '#F87171'];

            for (let i = 0; i < count; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';

                // Random properties
                const size = randomInt(4, 10);
                const color = randomItem(colors);

                particle.style.width = `${size}px`;
                particle.style.height = `${size}px`;
                particle.style.backgroundColor = color;
                particle.style.boxShadow = `0 0 ${size}px ${color}`;

                // Start position
                particle.style.left = `${x}px`;
                particle.style.top = `${y}px`;

                document.body.appendChild(particle);

                // Animate outwards
                const angle = Math.random() * Math.PI * 2;
                const velocity = randomInt(20, 100);
                const destX = x + Math.cos(angle) * velocity;
                const destY = y + Math.sin(angle) * velocity;

                // Use Web Animations API for smooth particle explosion
                particle.animate([
                    { transform: `translate(0, 0) scale(1)`, opacity: 1 },
                    { transform: `translate(${destX - x}px, ${destY - y}px) scale(0)`, opacity: 0 }
                ], {
                    duration: randomInt(400, 800),
                    easing: 'cubic-bezier(0, .9, .57, 1)'
                }).onfinish = () => particle.remove();
            }
        }


        function removeWord(index) {
            const wordObj = activeWords[index];
            wordObj.element.remove();
            activeWords.splice(index, 1);
        }

        function loseLife() {
            lives--;
            updateLivesDisplay();

            // Screen shake effect
            gameBody.classList.remove('shake');
            void gameBody.offsetWidth; // trigger reflow
            gameBody.classList.add('shake');
            setTimeout(() => gameBody.classList.remove('shake'), 500);

            // Flash red background
            const originalBg = gameBody.style.background;
            gameBody.style.background = '#450a0a';
            setTimeout(() => {
                gameBody.style.background = originalBg;
            }, 200);

            if (lives <= 0) {
                gameOver();
            }
        }

        function updateLivesDisplay() {
            let hearts = '';
            for (let i = 0; i < 3; i++) {
                if (i < lives) hearts += '❤️ ';
                else hearts += '🖤 ';
            }
            livesElement.innerText = hearts;
        }

        function startGame(difficultyMode) {
            // Apply difficulty settings if provided, otherwise use previously selected
            if (difficultyMode) {
                currentDifficulty = difficultyMode;
            }
            const settings = difficultyLevels[currentDifficulty];

            // Reset state
            score = 0;
            lives = 3;
            baseSpeed = settings.baseSpeed;
            spawnRate = settings.spawnRate;

            activeWords.forEach(w => w.element.remove());
            activeWords = [];
            wordIdCounter = 0;
            lastTime = 0;

            // Update UI
            scoreElement.innerText = score;
            updateLivesDisplay();
            typeInput.value = '';

            startScreen.classList.add('hidden');
            gameOverScreen.classList.add('hidden');

            isPlaying = true;
            typeInput.focus();

            // Start Audio
            startBGM();

            // Start loops
            spawnIntervalRef = setInterval(spawnWord, spawnRate);
            gameLoopRef = requestAnimationFrame(gameLoop);
        }

        function gameOver() {
            isPlaying = false;
            clearInterval(spawnIntervalRef);
            cancelAnimationFrame(gameLoopRef);

            // Stop Audio
            stopBGM();

            finalScoreElement.innerText = score;
            gameOverScreen.classList.remove('hidden');
            typeInput.blur();
        }

        // Event Listeners for buttons
        btnEasy.addEventListener('click', () => startGame('easy'));
        btnMedium.addEventListener('click', () => startGame('medium'));
        btnHard.addEventListener('click', () => startGame('hard'));

        restartBtn.addEventListener('click', () => startGame());
        menuBtn.addEventListener('click', () => {
            gameOverScreen.classList.add('hidden');
            startScreen.classList.remove('hidden');
        });

        // Prevent form submission behavior on enter key if it were in a form
        typeInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
            }
        });

    </script>
</body>
